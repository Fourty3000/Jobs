<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fourty3000 Jobs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #111827, #020617);
        color: white;
        min-height: 100vh;
        padding: 50px 20px;
      }

      .container {
        max-width: 1100px;
        margin: auto;
      }

      .hero {
        text-align: center;
        margin-bottom: 60px;
      }

      .hero h1 {
        font-size: 4rem;
        font-weight: 800;
        margin-bottom: 15px;
        background: linear-gradient(90deg, #f97316, #ef4444);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .hero p {
        color: #cbd5e1;
        font-size: 1.1rem;
      }

      .job-card {
        background: rgba(255, 255, 255, 0.05);
        border-radius: 24px;
        padding: 30px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        max-width: 500px;
        margin: auto;
        backdrop-filter: blur(12px);
        transition: 0.25s ease;
      }

      .job-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      }

      .badge {
        display: inline-flex;
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        margin-bottom: 20px;
        font-size: 0.85rem;
      }

      .open {
        background: rgba(34, 197, 94, 0.15);
        color: #4ade80;
        border: 1px solid rgba(34, 197, 94, 0.35);
      }

      .closed {
        background: rgba(239, 68, 68, 0.15);
        color: #f87171;
        border: 1px solid rgba(239, 68, 68, 0.35);
      }

      .job-card h2 {
        font-size: 1.8rem;
        margin-bottom: 15px;
      }

      .job-card p {
        color: #d1d5db;
        line-height: 1.6;
        margin-bottom: 25px;
      }

      .apply-btn {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        text-decoration: none;
        background: linear-gradient(90deg, #f97316, #ef4444);
        color: white;
        padding: 14px;
        border-radius: 14px;
        font-weight: 700;
        transition: 0.2s ease;
      }

      .apply-btn:hover {
        transform: scale(1.02);
        opacity: 0.92;
      }

      .apply-btn.disabled {
        background: #374151;
        pointer-events: none;
        cursor: not-allowed;
        color: #9ca3af;
      }

      footer {
        text-align: center;
        margin-top: 60px;
        color: #94a3b8;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="hero">
        <h1>Fourty3000 Jobs</h1>
        <p>Rejoins l'équipe créative du projet.</p>
      </div>

      <div class="job-card">
        <div class="badge open">🟢 Recrutement Ouvert</div>

        <h2>Monteur Vidéo Bénévole</h2>

        <p>
          Montage de vidéos YouTube, shorts, trailers et contenus
          communautaires.
        </p>

        <a
          class="apply-btn"
          href="https://forms.gle/G5EDgQ364qZw7pbB9"
          target="_blank"
        >
          Postuler
        </a>
      </div>
    </div>

      <footer>© 2026 Eminium Games</footer>
    </div>

    <script>
      // true = ouvert
      // false = fermé

      const recruitmentOpen = true;

      const badge = document.querySelector(".badge");
      const button = document.querySelector(".apply-btn");

      if (!recruitmentOpen) {
        badge.classList.remove("open");
        badge.classList.add("closed");
        badge.textContent = "🔴 Recrutement Fermé";

        button.classList.add("disabled");
        button.removeAttribute("href");
        button.textContent = "Recrutement Fermé";
      }
    </script>
  </body>
</html>
